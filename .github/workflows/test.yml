name: Unit test

on: push

jobs:
  test:
    name: Run unit tests
    strategy:
      matrix:
        python: ['3.10', '3.11', '3.12']
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    - name: Set up Python ${{ matrix.python }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python }}
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e .
    - name: Test
      run: python -m unittest discover -v -s test
  lint:
    name: Run black/ruff linters
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: 3.12
    - name: Ruff lint
      uses: astral-sh/ruff-action@v3
    - name: Black lint
      uses: psf/black@stable
      with:
        options: "--check --verbose"
        version: "25.12"
  verify-version:
    name: Check pyproject.toml version is updated
    runs-on: ubuntu-latest
    steps:
    - name: Checkout PR
      uses: actions/checkout@v4
      with:
        path: pr
    - name: Checkout master
      uses: actions/checkout@v4
      with:
        path: master
        ref: master
    - name: Check versions do not match
      id: getversion
      run: |
        pr_version=$(grep 'version = "[0-9\.]*"' pr/pyproject.toml | sed -n 's/[^0-9]*\([0-9\.]*\).*/v\1/p')
        master_version=$(grep 'version = "[0-9\.]*"' master/pyproject.toml | sed -n 's/[^0-9]*\([0-9\.]*\).*/v\1/p')
        echo "pr_version = $pr_version"
        echo "master_version = $master_version"
        [[ "$pr_version" == "$master_version" ]] && exit 1 || exit 0
