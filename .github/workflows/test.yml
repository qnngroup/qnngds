name: Unit test

on: push

jobs:
  test:
    name: Run unit tests
    strategy:
      matrix:
        python: ['3.10', '3.11', '3.12']
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    - name: Set up Python ${{ matrix.python }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python }}
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e .
    - name: Test
      run: python -m unittest discover -v -s test
  lint:
    name: Run black/ruff linters
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: 3.12
    - name: Ruff lint
      uses: astral-sh/ruff-action@v3
    - name: Black lint
      uses: psf/black@stable
      with:
        options: "--check --verbose"
        version: "25.12"
  verify-version:
    name: Check pyproject.toml version is updated
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: 3.12
    - name: Install qnngds
      run: |
        python -m pip install --upgrade pip
        pip install qnngds
    - name: Check versions does not match pypi latest
      id: getversion
      run: |
        pypi_version=$(pip show qnngds | grep 'Version:\s*[0-9\.]*' | sed -n 's/[^0-9]*\([0-9\.]*\).*/\1/p')
        pr_version=$(grep 'version = "[0-9\.]*"' pyproject.toml | sed -n 's/[^0-9]*\([0-9\.]*\).*/\1/p')
        echo "pr_version = $pr_version"
        echo "pypi_version =  $pypi_version"
        [[ "$pr_version" == "$pypi_version" ]] && exit 1 || exit 0
